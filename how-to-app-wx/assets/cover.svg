<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="1000" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6f4f1" />
      <stop offset="100%" stop-color="#e4def5" />
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="70" />
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1000" height="800" fill="url(#bg)" />

  <!-- 装饰色块 -->
  <circle cx="100" cy="150" r="150" fill="#cec5ee" opacity="0.55" filter="url(#blur)" />
  <circle cx="900" cy="180" r="170" fill="#cfe5f6" opacity="0.5" filter="url(#blur)" />
  <circle cx="820" cy="660" r="190" fill="#cce9e0" opacity="0.45" filter="url(#blur)" />
  <circle cx="160" cy="680" r="130" fill="#f5dccf" opacity="0.5" filter="url(#blur)" />
  <circle cx="520" cy="420" r="100" fill="#edd3dd" opacity="0.35" filter="url(#blur)" />

  <!-- 中心卡片 -->
  <rect x="260" y="230" width="480" height="340" rx="52" fill="#ffffff" opacity="0.86" />
  <rect x="260" y="230" width="480" height="340" rx="52" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="2" />

  <!-- 主标题 h2? -->
  <text x="500" y="450" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="160" font-weight="800" fill="#171717" letter-spacing="-4">h<tspan fill="#6b5ce7">2</tspan><tspan fill="#d99a5e">?</tspan></text>

  <!-- 底部小点 -->
  <circle cx="420" cy="560" r="8" fill="#6b5ce7" opacity="0.55" />
  <circle cx="460" cy="560" r="8" fill="#5cb38f" opacity="0.55" />
  <circle cx="500" cy="560" r="8" fill="#d99a5e" opacity="0.55" />
  <circle cx="540" cy="560" r="8" fill="#e06c75" opacity="0.55" />
  <circle cx="580" cy="560" r="8" fill="#6b5ce7" opacity="0.55" />
</svg>
