<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="logoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6f4f1" />
      <stop offset="100%" stop-color="#e4def5" />
    </linearGradient>
    <filter id="logoBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="32" />
    </filter>
  </defs>

  <rect width="400" height="400" rx="80" fill="url(#logoBg)" />

  <circle cx="70" cy="90" r="75" fill="#cec5ee" opacity="0.55" filter="url(#logoBlur)" />
  <circle cx="330" cy="110" r="85" fill="#cfe5f6" opacity="0.5" filter="url(#logoBlur)" />
  <circle cx="310" cy="310" r="95" fill="#cce9e0" opacity="0.45" filter="url(#logoBlur)" />
  <circle cx="90" cy="320" r="65" fill="#f5dccf" opacity="0.5" filter="url(#logoBlur)" />

  <rect x="80" y="100" width="240" height="200" rx="36" fill="#ffffff" opacity="0.9" />
  <rect x="80" y="100" width="240" height="200" rx="36" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="2" />

  <text x="200" y="245" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="88" font-weight="800" fill="#171717" letter-spacing="-2">h<tspan fill="#6b5ce7">2</tspan><tspan fill="#d99a5e">?</tspan></text>
</svg>
